paths:
  infer: "s3://mobavenue-simplismart-aws-s3-apse-sg/rtb/data/two_tower_ml/test_data_final/20260501_full_v2/"
  artifacts_base: "s3://mobavenue-simplismart-aws-s3-apse-sg/rtb/data/two_tower_ml/3_Client/"

# device_id_col: optional first candidate when resolving the Parquet column for the user/device id.
# Inference also tries the training vocab name, then device_id, dev_id, ifa, advertising_id.
# If two columns exist (e.g. empty dev_id + populated device_id), the worker picks the one with
# more non-null values in the first batch peek.
features:
  device_id_col: "dev_id"
  user_feature_cols: []
  user_multi_cols: []

infer:
  # Column name written to ranking Parquet (match your Athena/Glue table DDL).
  ranking_device_id_col: "device_id"
  topk_clients: 3
  infer_stream_batch_rows: 65536
  num_physical_gpus: 4
  workers_per_gpu: 3
  ranking_output: "s3://mobavenue-simplismart-aws-s3-apse-sg/rtb/data/two_tower_ml/user_client_rankings_0501_v2/"
  rank_user_batch: 2048
  client_chunk: 2048
  use_amp: true
  amp_dtype: "float16"
  user_tower_backend: "pytorch"
  user_tower_onnx_uri: null
  trt_fp16_enable: true
  trt_engine_cache_enable: true
  trt_engine_cache_path: null
  output_min_rows_per_part: 100000
  output_parquet_compression: "zstd"
  debug_cuda: false
  # Optional run-size controls for quick smoke tests (null = no limit).
  max_files: null
  max_users_per_file: null

extra: {}

