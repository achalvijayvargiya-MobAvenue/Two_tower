train:
  experiment_name: two_tower_mlp
  run_name: null
  seed: 42
  batch_size: 4096
  epochs: 20
  steps_per_epoch: 226
  batch_balance: true
  batch_balance_neg_per_pos: 3
  train_eval_max_examples: 200000
  train_client_eval_max_examples: 200000
  # Stop if val ROC-AUC does not improve for this many epochs (restores best weights as before).
  early_stopping_patience: 5
  # Full data from paths; pipeline downsampling off (orchestrator Step 3a also set to skip).
  downsample_train: false
  downsample_val: false
  lr: 0.001
  weight_decay: 0.0
  embed_dim: 1024
  min_count: 1000
  num_oov_buckets: 8
  multi_max_tokens: 32
  num_workers: 4
  device: cuda
  pretrained_emb_dim: 128
  pretrained_cat_emb_dim: 128
  freeze_pretrained_base: true
  multi_cat_pool: mean
  client_mlp_hidden:
  - 128
  - 128
  user_mlp_hidden:
  - 128
  - 128
infer:
  topk_clients: 3
  infer_stream_batch_rows: 65536
  num_physical_gpus: 1
  workers_per_gpu: 1
